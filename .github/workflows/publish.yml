name: Publish to PyPI

on:
  push:
    tags:
      - 'v*' # This triggers the workflow only when you push a tag like v0.1.0

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    # This 'environment' name must match what you typed in PyPI settings
    environment: pypi
    permissions:
      id-token: write # Required for OIDC trusted publishing
      contents: write # CHANGED: Required to create a GitHub Release for Zenodo

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.8"

    - name: Install build dependencies
      run: pip install build

    - name: Build binary wheel and source tarball
    # This runs the same 'python -m build' you did manually
      run: python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
